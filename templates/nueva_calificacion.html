{% extends "base.html" %}
{% block content %}

<h2>Nueva Calificación</h2>

<form method="POST">
    <div class="mb-3">
        <label>Inscripción</label>
        <select name="id_inscripcion" class="form-select">
            {% for i in inscripciones %}
            <option value="{{ i.id_inscripcion }}">
                {{ i.apellido }} {{ i.nombre }} - {{ i.nombre_curso }}
            </option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label>Nota</label>
        <input type="number" step="0.01" name="nota" class="form-control">
    </div>

    <button class="btn btn-success">Guardar</button>
</form>

{% endblock %}
